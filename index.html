<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGC切片数据处理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e1eaff 50%, #f8fbff 100%);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* 标题区域 */
        .page-header {
            text-align: center;
            padding: 70px 20px 50px;
        }

        .page-header h1 {
            font-size: 42px;
            font-weight: 800;
            color: #165DFF;
            letter-spacing: 3px;
            text-shadow: 0 6px 16px rgba(22,93,255,0.15);
            position: relative;
        }

        /* 导航条 */
        .nav-wrapper {
            max-width: 1100px;
            margin: 0 auto 50px;
            padding: 0 20px;
            overflow-x: auto;
        }

        .nav-wrapper::-webkit-scrollbar { height: 0; }

        .nav-container {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-item {
            padding: 16px 36px;
            background: #ffffff;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 500;
            color: #555;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 6px 18px rgba(22,93,255,0.06);
            border: 1px solid #f0f7ff;
        }

        .nav-item.active {
            background: linear-gradient(90deg, #165DFF, #2b7dff);
            color: #fff;
            box-shadow: 0 8px 22px rgba(22,93,255,0.25);
            transform: translateY(-3px);
        }

        .nav-item:hover:not(.active) {
            transform: translateY(-6px);
            color: #165DFF;
            border-color: #165DFF;
            box-shadow: 0 12px 24px rgba(22,93,255,0.12);
        }

        /* 内容卡片 */
        .content-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-card {
            display: none;
            background: #ffffff;
            border-radius: 22px;
            padding: 50px;
            box-shadow: 0 15px 35px rgba(22,93,255,0.08);
            min-height: 500px;
            animation: fadeIn 0.5s ease forwards;
        }

        .section-card.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-card h2 {
            font-size: 26px;
            color: #1f2937;
            margin-bottom: 30px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e8f0fe;
            position: relative;
        }

        .section-card h2::after {
            content: "";
            width: 50px;
            height: 3px;
            background: #165DFF;
            border-radius: 3px;
            position: absolute;
            left: 0;
            bottom: -2px;
        }

        .empty-tip {
            color: #9ca3af;
            font-size: 18px;
            text-align: center;
            margin-top: 120px;
        }

        /* ===================== 拆分数据板块 · 高级排版 ===================== */
        .upload-area {
            border: 2px dashed #cfe2ff;
            border-radius: 18px;
            padding: 50px 20px;
            text-align: center;
            margin-bottom: 40px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8fbff;
        }

        .upload-area:hover {
            border-color: #165DFF;
            background: #f0f7ff;
        }

        .upload-area input {
            display: none;
        }

        .upload-icon {
            font-size: 48px;
            color: #165DFF;
            margin-bottom: 18px;
        }

        .upload-text {
            font-size: 17px;
            font-weight: 500;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 14px;
            color: #888;
        }

        .file-name {
            margin-top: 18px;
            font-weight: 500;
            color: #165DFF;
            font-size: 15px;
        }

        /* 选项区域 */
        .options-group {
            margin-bottom: 30px;
            padding: 24px;
            background: #fafbff;
            border-radius: 16px;
            border: 1px solid #f0f5ff;
        }

        .option-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .option-item:last-child {
            margin-bottom: 0;
        }

        .option-item input {
            width: 20px;
            height: 20px;
            margin-right: 14px;
            accent-color: #165DFF;
            cursor: pointer;
        }

        .option-item label {
            cursor: pointer;
            color: #333;
            font-weight: 500;
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 14px;
            padding: 18px 40px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 180px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #165DFF, #2b7dff);
            color: white;
            box-shadow: 0 6px 16px rgba(22,93,255,0.2);
        }

        .btn-success {
            background: linear-gradient(90deg, #00b42a, #00d82b);
            color: white;
            box-shadow: 0 6px 16px rgba(0,180,42,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 20px;
            color: #165DFF;
            font-size: 16px;
            display: none;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #165DFF;
            border-top-color: transparent;
            border-radius: 50%;
            margin-left: 8px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 预览区域 */
        .preview-area {
            display: none;
            margin-top: 20px;
        }

        .preview-area h3 {
            font-size: 20px;
            color: #1f2937;
            margin-bottom: 16px;
            padding-left: 8px;
            border-left: 4px solid #165DFF;
        }

        .preview-box {
            background: #f8fbff;
            border: 1px solid #e8f0fe;
            border-radius: 16px;
            padding: 24px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>

<body>

<!-- 标题 -->
<div class="page-header">
    <h1>AIGC切片数据处理</h1>
</div>

<!-- 导航 -->
<div class="nav-wrapper">
    <div class="nav-container">
        <div class="nav-item active" data-target="tab1">拆分数据</div>
        <div class="nav-item" data-target="tab2">多表合并去重</div>
        <div class="nav-item" data-target="tab3">待定功能三</div>
        <div class="nav-item" data-target="tab4">待定功能四</div>
        <div class="nav-item" data-target="tab5">待定功能五</div>
    </div>
</div>

<!-- 内容区 -->
<div class="content-wrap">
    <!-- 1 拆分数据板块 -->
    <div class="section-card active" id="tab1">
        <h2>拆分数据</h2>

        <!-- Excel 上传区域 -->
        <div class="upload-area" id="uploadBox">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽上传 Excel 文件</div>
            <div class="upload-hint">支持格式：.xlsx / .xls</div>
            <input type="file" id="fileInput" accept=".xlsx,.xls">
            <div class="file-name" id="fileName"></div>
        </div>

        <!-- 4个勾选项 -->
        <div class="options-group">
            <div class="option-item">
                <input type="checkbox" id="opt1">
                <label for="opt1">随机匹配模特</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="opt2">
                <label for="opt2">拆分kt版</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="opt3">
                <label for="opt3">拆分堆持品</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="opt4">
                <label for="opt4">自定义拆分选项</label>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="btn-group">
            <button class="btn btn-primary" id="splitBtn">开始拆分</button>
            <button class="btn btn-success" id="exportBtn" disabled>确认导出</button>
        </div>

        <!-- 加载中 -->
        <div class="loading" id="loading">数据处理中，请稍候...</div>

        <!-- 预览区域 -->
        <div class="preview-area" id="previewArea">
            <h3>✅ 拆分结果预览</h3>
            <div class="preview-box" id="previewContent"></div>
        </div>
    </div>

    <!-- 其他板块 -->
    <div class="section-card" id="tab2">
        <h2>多表合并去重</h2>
        <p class="empty-tip">功能开发中...</p>
    </div>

    <div class="section-card" id="tab3">
        <h2>待定功能三</h2>
        <p class="empty-tip">预留功能区</p>
    </div>

    <div class="section-card" id="tab4">
        <h2>待定功能四</h2>
        <p class="empty-tip">预留功能区</p>
    </div>

    <div class="section-card" id="tab5">
        <h2>待定功能五</h2>
        <p class="empty-tip">预留功能区</p>
    </div>
</div>

<script>
    // 导航切换
    const navItems = document.querySelectorAll('.nav-item');
    const tabs = document.querySelectorAll('.section-card');
    navItems.forEach(item => {
        item.addEventListener('click', () => {
            navItems.forEach(n => n.classList.remove('active'));
            tabs.forEach(t => t.classList.remove('active'));
            item.classList.add('active');
            const id = item.dataset.target;
            document.getElementById(id).classList.add('active');
        });
    });

    // ===================== 拆分数据核心功能 =====================
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const splitBtn = document.getElementById('splitBtn');
    const exportBtn = document.getElementById('exportBtn');
    const loading = document.getElementById('loading');
    const previewArea = document.getElementById('previewArea');
    const previewContent = document.getElementById('previewContent');

    let resultData = null; // 存储拆分结果

    // 上传文件
    uploadBox.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            fileName.textContent = `已选择：${e.target.files[0].name}`;
            exportBtn.disabled = true;
            previewArea.style.display = 'none';
        }
    });

    // 开始拆分
    splitBtn.addEventListener('click', async () => {
        if (!fileInput.files[0]) {
            alert('请先上传 Excel 文件！');
            return;
        }

        // 显示加载
        splitBtn.disabled = true;
        loading.style.display = 'block';
        previewArea.style.display = 'none';
        exportBtn.disabled = true;

        // 模拟处理延迟
        setTimeout(() => {
            // 获取选项
            const opt1 = document.getElementById('opt1').checked;
            const opt2 = document.getElementById('opt2').checked;
            const opt3 = document.getElementById('opt3').checked;
            const opt4 = document.getElementById('opt4').checked;

            // 模拟拆分结果
            resultData = `
【文件名称】：${fileInput.files[0].name}
【拆分时间】：${new Date().toLocaleString()}
【拆分选项】：
  ✅ 随机匹配模特：${opt1 ? '是' : '否'}
  ✅ 拆分kt版：${opt2 ? '是' : '否'}
  ✅ 拆分堆持品：${opt3 ? '是' : '否'}
  ✅ 自定义拆分：${opt4 ? '是' : '否'}

【拆分结果预览】
========================
总行数：128 行
有效数据：120 行
已拆分模块：
  1. KT版数据：35 条
  2. 堆持品数据：48 条
  3. 模特匹配数据：37 条
========================

数据已完成拆分，可点击「确认导出」下载文件！
            `;

            // 显示预览
            previewContent.textContent = resultData;
            previewArea.style.display = 'block';
            
            // 恢复状态
            loading.style.display = 'none';
            splitBtn.disabled = false;
            exportBtn.disabled = false;

        }, 1500);
    });

    // 确认导出
    exportBtn.addEventListener('click', () => {
        if (!resultData) {
            alert('暂无数据可导出！');
            return;
        }
        alert('✅ 导出成功！文件已开始下载');
        // 真实项目这里会触发后端文件下载
    });
</script>

</body>
</html>
