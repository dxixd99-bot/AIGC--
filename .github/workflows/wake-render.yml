name: Wake Render Backend
# 同时支持：定时自动执行 + 手动触发
on:
  schedule:
    - cron: '*/10 * * * *'  # 每10分钟自动执行一次（UTC时间，对应北京时间+8小时）
  workflow_dispatch:  # 保留手动触发

jobs:
  wakeup:
    runs-on: ubuntu-latest
    steps:
      - name: Call Render deploy hook
        run: curl -s ${{ secrets.RENDER_WAKE_HOOK }}
